name: Build Cordova Android

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Cordova Android 12+ usually requires JDK 11 or 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Cordova and Dependencies
        run: |
          npm install -g cordova
          npm install

      - name: Prepare and Build Android
        run: |
          cordova platform add android --nosave
          cordova build android --release --no-telemetry

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: platforms/android/app/build/outputs/apk/release/*.apk
